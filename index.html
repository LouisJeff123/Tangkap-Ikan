<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kucing Tangkap Ikan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none; /* Mencegah scrolling saat main di HP */
        }
        canvas {
            touch-action: none;
        }
    </style>
</head>
<!-- Ubah min-h-screen menjadi h-[100dvh] dan sesuaikan flex container -->
<body class="bg-indigo-900 text-white h-[100dvh] flex flex-col items-center justify-between font-sans overflow-hidden">

    <!-- Header dengan ukuran responsif (mengecil di HP, membesar di PC) -->
    <div class="text-center my-2 sm:my-4 z-10 shrink-0 px-2">
        <h1 class="text-2xl sm:text-3xl font-bold text-yellow-400 drop-shadow-md">🐱 Tangkap Ikan! 🐟</h1>
        <p class="text-xs sm:text-sm text-indigo-200 mt-1">Geser kucing untuk menangkap ikan. Hindari bom!</p>
    </div>

    <!-- Container Game dibikin FULL WIDTH (w-full tanpa max-width) biar mentok kiri kanan di PC -->
    <div id="gameContainer" class="relative w-full flex-1 bg-indigo-800 border-y-4 border-indigo-500 shadow-2xl overflow-hidden">
        <!-- UI Overlay -->
        <div class="absolute top-2 sm:top-4 left-4 sm:left-8 z-10 text-lg sm:text-xl font-bold text-white drop-shadow-md">
            Skor: <span id="scoreDisplay">0</span>
        </div>
        <div class="absolute top-2 sm:top-4 right-4 sm:right-8 z-10 text-lg sm:text-xl font-bold text-white drop-shadow-md">
            Nyawa: <span id="livesDisplay">❤️❤️❤️</span>
        </div>

        <!-- Layar Mulai / Game Over -->
        <div id="menuScreen" class="absolute inset-0 bg-black bg-opacity-70 z-20 flex flex-col items-center justify-center p-4 text-center">
            <h2 id="menuTitle" class="text-3xl sm:text-4xl font-extrabold text-white mb-2 shadow-black drop-shadow-lg">Siap Main?</h2>
            <p id="finalScore" class="text-lg sm:text-xl text-yellow-300 mb-6 hidden font-bold">Skor Akhir: 0</p>
            <button id="startBtn" class="px-6 py-3 bg-yellow-500 hover:bg-yellow-400 text-indigo-900 font-bold rounded-full text-lg sm:text-xl transition transform hover:scale-105 shadow-lg">
                Mulai Game
            </button>
        </div>

        <!-- Canvas Game (Pindahkan border dan bg ke container agar rapi di semua layar) -->
        <canvas id="gameCanvas" class="w-full h-full block touch-none"></canvas>
    </div>

    <!-- Footer dengan ukuran responsif -->
    <div class="my-2 sm:my-4 text-[10px] sm:text-xs text-indigo-300 text-center px-4 shrink-0">
        *Mainkan dengan mouse (geser) atau sentuh layar di HP.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const menuScreen = document.getElementById('menuScreen');
        const menuTitle = document.getElementById('menuTitle');
        const finalScoreText = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');

        // Variabel Game
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let lives = 3;
        let frameCount = 0;
        let animationId;
        let difficultyMultiplier = 1;

        // --- Sistem Audio Sintetis (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playSound(type) {
            // Lanjutkan konteks audio jika tertidur (wajib untuk browser modern)
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'fish') {
                // Suara "Ting!" (koin/poin)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, now);
                oscillator.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                oscillator.start(now);
                oscillator.stop(now + 0.1);
            } else if (type === 'bomb') {
                // Suara "Bzzzt/Boom!" (kerusakan)
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(150, now);
                oscillator.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                oscillator.start(now);
                oscillator.stop(now + 0.2);
            } else if (type === 'gameover') {
                // Suara menurun (Kalah)
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(400, now);
                oscillator.frequency.exponentialRampToValueAtTime(50, now + 0.6);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                oscillator.start(now);
                oscillator.stop(now + 0.6);
            }
        }

        // Karakter Utama (Kucing)
        const player = {
            x: 200,
            y: 500,
            size: 50, // Ukuran font emoji
            emoji: '🐱'
        };

        // Fungsi agar canvas selalu responsif mengikuti layar
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // Sesuaikan posisi Y pemain agar selalu di bawah
            player.y = canvas.height - 60;
            
            // Pastikan pemain tidak keluar layar jika layar dikecilkan
            if (player.x > canvas.width) player.x = canvas.width / 2;
            
            // Render ulang layar awal jika game belum berjalan
            if (gameState === 'START' || gameState === 'GAMEOVER') {
                ctx.fillStyle = "#3730a3";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (gameState === 'START') player.x = canvas.width / 2;
                drawPlayer();
            }
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Benda yang jatuh
        let items = [];
        const itemTypes = [
            { type: 'fish', emoji: '🐟', chance: 0.7, points: 10, speed: 3 },
            { type: 'bomb', emoji: '💣', chance: 0.3, points: 0, speed: 4 }
        ];

        // Event Listener untuk pergerakan
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            return (evt.clientX - rect.left) * scaleX;
        }

        function getTouchPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            return (evt.touches[0].clientX - rect.left) * scaleX;
        }

        canvas.addEventListener('mousemove', (e) => {
            if (gameState === 'PLAYING') {
                player.x = getMousePos(e);
                // Batasi pergerakan agar tidak keluar layar
                if (player.x < 0) player.x = 0;
                if (player.x > canvas.width) player.x = canvas.width;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (gameState === 'PLAYING') {
                e.preventDefault(); // Mencegah scrolling layar
                player.x = getTouchPos(e);
                if (player.x < 0) player.x = 0;
                if (player.x > canvas.width) player.x = canvas.width;
            }
        }, { passive: false });

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume(); // Izinkan audio berjalan saat tombol diklik
            resetGame();
            gameState = 'PLAYING';
            menuScreen.classList.add('hidden');
            gameLoop();
        });

        function resetGame() {
            score = 0;
            lives = 3;
            items = [];
            frameCount = 0;
            difficultyMultiplier = 1;
            player.x = canvas.width / 2;
            updateUI();
        }

        function spawnItem() {
            // Tingkatkan kesulitan seiring waktu
            if (frameCount % 600 === 0) { // Setiap 10 detik (asumsi 60fps)
                difficultyMultiplier += 0.2;
            }

            // Peluang spawn benda baru
            if (Math.random() < 0.03 * difficultyMultiplier) {
                const rand = Math.random();
                let cumulativeChance = 0;
                let selectedType = itemTypes[0];

                for (let type of itemTypes) {
                    cumulativeChance += type.chance;
                    if (rand <= cumulativeChance) {
                        selectedType = type;
                        break;
                    }
                }

                items.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    ...selectedType,
                    currentSpeed: selectedType.speed * (1 + (difficultyMultiplier - 1) * 0.5)
                });
            }
        }

        function drawPlayer() {
            ctx.save();
            
            // Gambar lingkaran latar belakang yang cerah untuk Kucing
            ctx.beginPath();
            ctx.arc(player.x, player.y, 32, 0, Math.PI * 2);
            ctx.fillStyle = "#FBBF24"; // Kuning cerah
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#FFFFFF"; // Garis tepi putih
            ctx.stroke();
            ctx.closePath();

            // Gambar emoji kucing
            ctx.font = "40px Arial"; // Ukuran disesuaikan agar pas di lingkaran
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(player.emoji, player.x, player.y + 3); // +3 agar posisinya pas di tengah
            
            ctx.restore();
        }

        function drawItems() {
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.currentSpeed;

                ctx.save();
                
                // Gambar lingkaran latar belakang yang cerah untuk item
                ctx.beginPath();
                ctx.arc(item.x, item.y, 28, 0, Math.PI * 2);
                
                if (item.type === 'fish') {
                    ctx.fillStyle = "#22D3EE"; // Cyan/Biru muda cerah untuk ikan
                } else if (item.type === 'bomb') {
                    ctx.fillStyle = "#EF4444"; // Merah terang untuk bom
                }
                
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#FFFFFF"; // Garis tepi putih
                ctx.stroke();
                ctx.closePath();

                // Gambar emoji item
                ctx.font = "35px Arial"; 
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(item.emoji, item.x, item.y + 3);
                
                ctx.restore();

                // Cek tabrakan
                const distX = Math.abs(player.x - item.x);
                const distY = Math.abs(player.y - item.y);

                // Jarak deteksi tabrakan (hitbox sederhana)
                if (distX < 40 && distY < 40) {
                    if (item.type === 'fish') {
                        score += item.points;
                        playSound('fish'); // Mainkan efek suara ikan
                    } else if (item.type === 'bomb') {
                        lives -= 1;
                        playSound('bomb'); // Mainkan efek suara bom
                        // Efek layar merah sejenak
                        ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    items.splice(i, 1);
                    updateUI();
                    
                    if (lives <= 0) {
                        gameOver();
                    }
                    continue;
                }

                // Hapus item jika lewat batas bawah
                if (item.y > canvas.height + 50) {
                    // Jika ikan terlewat, tidak apa-apa (atau bisa kurangi skor/nyawa jika mau lebih susah)
                    items.splice(i, 1);
                }
            }
        }

        function updateUI() {
            scoreDisplay.innerText = score;
            let hearts = '';
            for(let i=0; i<lives; i++) hearts += '❤️';
            livesDisplay.innerText = hearts;
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            playSound('gameover'); // Mainkan efek suara kalah
            cancelAnimationFrame(animationId);
            menuTitle.innerText = "Game Over!";
            menuTitle.classList.replace('text-white', 'text-red-500');
            finalScoreText.innerText = `Skor Akhir: ${score}`;
            finalScoreText.classList.remove('hidden');
            startBtn.innerText = "Main Lagi";
            menuScreen.classList.remove('hidden');
        }

        function drawBackground() {
            // Gambar latar belakang awan sederhana
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Efek bintang / partikel
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.arc((frameCount * 0.5 + i * 100) % canvas.width, (i * 120 + 50), 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            frameCount++;
            drawBackground();
            spawnItem();
            drawItems();
            drawPlayer();

            animationId = requestAnimationFrame(gameLoop);
        }

        // Inisialisasi ukuran canvas pertama kali
        resizeCanvas();

    </script>
</body>
</html>
